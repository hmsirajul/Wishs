<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise 🎂</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(#1a0030,#000);
    overflow:hidden;
    font-family:sans-serif;
}

/* TITLE */
h1{
    position:absolute;
    top:30px;
    left:50%;
    transform:translateX(-50%);
    font-size:4rem;
    letter-spacing:0.08em;
    color:#ffb3d9;
    text-shadow: 0 0 18px rgba(255,179,217,0.9), 0 0 40px rgba(255,179,217,0.4);
    opacity:1;
    transition:1s;
}

/* CAKE */
.cake{
    position:relative;
    width:250px;
    height:300px;
}

/* LAYERS */
.layer{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    border-radius:20px;
    opacity:0;
    transition:1s;
}

.layer1{
    bottom:0;
    width:220px;
    height:70px;
    background:#ff4d6d;
}

.layer2{
    bottom:70px;
    width:180px;
    height:70px;
    background:#ff758f;
}

.layer3{
    bottom:140px;
    width:140px;
    height:70px;
    background:#ff8fa3;
}

/* CANDLES */
.candle{
    position:absolute;
    bottom:210px;
    width:8px;
    height:40px;
    background:white;
    border-radius:5px;
    opacity:0;
}

.flame{
    position:absolute;
    top:-12px;
    left:50%;
    transform:translateX(-50%);
    width:10px;
    height:15px;
    background:orange;
    border-radius:50%;
    opacity:0;
    animation:flicker 0.2s infinite;
}

@keyframes flicker{
    0%{transform:translateX(-50%) scale(1);}
    50%{transform:translateX(-50%) scale(1.3);}
    100%{transform:translateX(-50%) scale(1);}
}

.fireworks {
    position:absolute;
    inset:0;
    pointer-events:none;
    overflow:hidden;
}

.firework {
    position:absolute;
    width:8px;
    height:8px;
    border-radius:50%;
    opacity:0;
    will-change:transform,opacity;
}

.balloon-container {
    position:absolute;
    inset:0;
    pointer-events:none;
    overflow:hidden;
}

.balloon {
    position:absolute;
    width:44px;
    height:58px;
    border-radius:50% 50% 45% 45%;
    background: radial-gradient(circle at 30% 30%, #ff93c2 15%, #ff3e96 55%);
    box-shadow: inset -4px -6px rgba(255,255,255,.38), 0 10px 18px rgba(0,0,0,.18);
    opacity:0;
}

.balloon::after {
    content: '';
    position:absolute;
    bottom:-18px;
    left:50%;
    width:2px;
    height:20px;
    background:#483737;
    transform:translateX(-50%);
}

.balloon::before {
    content: '';
    position:absolute;
    top:12px;
    left:50%;
    width:12px;
    height:12px;
    background:rgba(255,255,255,.55);
    border-radius:50%;
    transform:translateX(-50%);
}

.music-button {
    position:absolute;
    top:calc(50% + 190px);
    left:50%;
    transform:translateX(-50%);
    padding:0.75rem 1.3rem;
    border:none;
    border-radius:999px;
    background: linear-gradient(135deg,#ff76b2,#ffd86a);
    color:#25012b;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 12px 30px rgba(0,0,0,0.2);
    transition:transform .2s ease, opacity .2s ease;
}

.music-button:hover {
    transform:translateX(-50%) scale(1.05);
}

.music-button:active {
    transform:translateX(-50%) scale(0.98);
}

@keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity:0; }
    10% { opacity:1; }
    100% { transform: translateY(-110vh) scale(1.05); opacity:0; }
}

@keyframes floatText {
    0% { transform: translate(0, 0) scale(1); opacity:0; }
    10% { opacity:1; }
    50% { transform: translate(6px, -55vh) scale(1.05); }
    100% { transform: translate(-10px, -110vh) scale(1.03); opacity:0; }
}

.floating-text-container {
    position:absolute;
    inset:0;
    pointer-events:none;
    overflow:hidden;
}

.floating-text {
    position:absolute;
    color:#ffffff;
    font-size:3rem;
    font-weight:800;
    text-shadow: 0 0 18px rgba(255,255,255,0.9), 0 0 30px rgba(155, 89, 182, 0.7);
    opacity:0;
    white-space:nowrap;
}

.floating-text.small {
    font-size:2rem;
}

/* CUT EFFECT */
.slice{
    position:absolute;
    width:220px;
    height:20px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(255,255,255,0.08);
    opacity:0;
    transition:1s;
}
    80% { opacity:1; }
    100% { opacity:0; transform: scale(2); }
}

/* CUT EFFECT */
.slice{
    position:absolute;
    width:220px;
    height:20px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(255,255,255,0.08);
    opacity:0;
    transition:1s;
}

.slice1{bottom:0;}
.slice2{bottom:25px;}
.slice3{bottom:50px;}
</style>
</head>

<body>

<div class="fireworks" id="fireworks"></div>
<div class="balloon-container" id="balloonContainer"></div>
<div class="floating-text-container" id="floatingTextContainer"></div>
<h1 id="msg">Happy Birtheday 🎉</h1>
<button id="musicButton" class="music-button">Play Birthday Music</button>

<div class="cake">

    <div class="layer layer3"></div>
    <div class="layer layer2"></div>
    <div class="layer layer1"></div>

    <!-- candles -->
    <div class="candle" style="left:60px">
        <div class="flame"></div>
    </div>

    <div class="candle" style="left:120px">
        <div class="flame"></div>
    </div>

    <div class="candle" style="left:180px">
        <div class="flame"></div>
    </div>

    <!-- slices -->
    <div class="slice slice1"></div>
    <div class="slice slice2"></div>
    <div class="slice slice3"></div>

</div>

<script>
window.onload = function(){

    const layers = document.querySelectorAll(".layer");
    const candles = document.querySelectorAll(".candle");
    const flames = document.querySelectorAll(".flame");
    const slices = document.querySelectorAll(".slice");
    const msg = document.getElementById("msg");

    // STEP 1: build cake
    layers.forEach((l,i)=>{
        setTimeout(()=> l.style.opacity=1, i*600);
    });

    // STEP 2: show candles
    setTimeout(()=>{
        candles.forEach((c,i)=>{
            setTimeout(()=> c.style.opacity=1, i*400);
        });
    }, 2000);

    // STEP 3: fire flames
    setTimeout(()=>{
        flames.forEach(f=> f.style.opacity=1);
    }, 4000);

    // STEP 4: message
    setTimeout(()=>{
        msg.style.opacity=1;
    }, 4500);

    // STEP 5: cut cake
    setTimeout(()=>{
        slices.forEach((s,i)=>{
            setTimeout(()=> s.style.opacity=1, i*300);
        });
    }, 6000);

    // STEP 6: blow candles
    setTimeout(()=>{
        flames.forEach(f=>{
            f.style.opacity=0;
        });
    }, 7500);

    // balloons and fireworks
    const fireworks = document.getElementById('fireworks');
    const balloonContainer = document.getElementById('balloonContainer');
    const floatingTextContainer = document.getElementById('floatingTextContainer');
    const balloonColors = ['#ff6b6b','#f9c74f','#7fc8ff','#b569ff','#5eead4'];

    function createFloatingText(text, size){
        const floating = document.createElement('div');
        floating.className = 'floating-text' + (size === 'small' ? ' small' : '');
        floating.textContent = text;
        floating.style.left = `${10 + Math.random() * 70}%`;
        floating.style.bottom = '-20px';
        floating.style.animation = `floatText ${8 + Math.random() * 3}s ease-out forwards`;
        floating.style.animationDelay = `${Math.random() * 2}s`;
        floatingTextContainer.appendChild(floating);
        setTimeout(()=> floating.remove(), 14000);
    }

    function createBalloon(index){
        const balloon = document.createElement('div');
        balloon.className = 'balloon';
        balloon.style.left = `${10 + Math.random() * 80}%`;
        balloon.style.top = '110%';
        balloon.style.background = `radial-gradient(circle at 30% 30%, ${balloonColors[index % balloonColors.length]} 20%, ${balloonColors[(index + 1) % balloonColors.length]} 60%)`;
        balloon.style.animation = `floatUp ${8 + Math.random() * 3 + 5}s ease-out forwards`;
        balloon.style.animationDelay = `${Math.random() * 2}s`;
        balloon.style.willChange = 'transform, opacity';
        balloonContainer.appendChild(balloon);
        setTimeout(()=> balloon.remove(), 15000);
    }

    function launchFirework(){
        const centerX = 12 + Math.random() * 76;
        const centerY = 15 + Math.random() * 24;
        const colors = ['#fff', '#ffdc7d', '#ff6b6b', '#7de6ff', '#f9a8ff'];
        for(let i=0;i<16;i++){
            const spark = document.createElement('div');
            spark.className = 'firework';
            spark.style.left = `${centerX}%`;
            spark.style.top = `${centerY}%`;
            spark.style.background = colors[i % colors.length];
            const angle = Math.PI * 2 * i / 16;
            const distance = 60 + Math.random() * 60;
            spark.style.opacity = '1';
            spark.style.transform = `translate(-50%, -50%)`;
            spark.style.transition = 'transform 1.1s ease-out, opacity 1.1s ease-out';
            fireworks.appendChild(spark);
            requestAnimationFrame(()=>{
                spark.style.transform = `translate(calc(-50% + ${Math.cos(angle) * distance}px), calc(-50% + ${Math.sin(angle) * distance}px))`;
                spark.style.opacity = '0';
            });
            setTimeout(()=> spark.remove(), 1200);
        }
    }

    let balloonCount = 0;
    const balloonTimer = setInterval(()=>{
        if(balloonCount++ < 12){
            createBalloon(balloonCount);
        } else {
            clearInterval(balloonTimer);
        }
    }, 700);

    setTimeout(()=>{
        const fireworkTimer = setInterval(()=> launchFirework(), 900);
        setTimeout(()=> clearInterval(fireworkTimer), 12000);
    }, 1500);

    setTimeout(()=>{
        createFloatingText('23');
        createFloatingText('23 years', 'small');
        createFloatingText('23');
    }, 1000);

    const musicButton = document.getElementById('musicButton');
    let audioContext;
    let musicStarted = false;

    function playBirthdayMusic(){
        if(musicStarted) return;
        musicStarted = true;
        musicButton.textContent = 'Playing...';
        musicButton.disabled = true;

        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const now = audioContext.currentTime;
        const melody = [
            ['C4', 'C4', 'D4', 'C4', 'F4', 'E4'],
            ['C4', 'C4', 'D4', 'C4', 'G4', 'F4'],
            ['C4', 'C4', 'C5', 'A4', 'F4', 'E4', 'D4'],
            ['A#4', 'A#4', 'A4', 'F4', 'G4', 'F4']
        ];
        const noteDuration = 0.5;
        let time = now;

        function freq(note){
            const notes = {
                'C4':261.63,'D4':293.66,'E4':329.63,'F4':349.23,'G4':392.00,'A4':440.00,'A#4':466.16,'C5':523.25
            };
            return notes[note] || 440;
        }

        melody.flat().forEach((note, index)=>{
            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();
            oscillator.type = 'triangle';
            oscillator.frequency.setValueAtTime(freq(note), time);
            gain.gain.setValueAtTime(0.0001, time);
            gain.gain.exponentialRampToValueAtTime(0.3, time + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.0001, time + noteDuration - 0.05);
            oscillator.connect(gain).connect(audioContext.destination);
            oscillator.start(time);
            oscillator.stop(time + noteDuration);
            time += noteDuration;
        });
    }

    musicButton.addEventListener('click', playBirthdayMusic);
    document.body.addEventListener('pointerdown', ()=>{
        if(!musicStarted) playBirthdayMusic();
    }, {once:true});
};
 
</script>

</body>
</html>
